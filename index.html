<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CMYK+White – realistic paint mixing game | mix cyan, magenta, yellow, black and white like real paint</title>
<meta name="description" content="A paint mixing simulator for CMYK paint mixing: mix cyan, magenta, yellow, black and white like real paint tubes, test ratios, save mixes and match target colors." />
<meta property="og:title" content="CMYK+White – mix paints like real tubes" />
<meta property="og:description" content="Mix colors like real paint with cyan, magenta, yellow, black and white. A single-page paint mixing simulator powered by Mixbox with a Kubelka-Munk fallback." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://your-github-username.github.io/cmyk-white-mixer/" />
<meta property="og:site_name" content="CMYK+White" />

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "CMYK+White – mix paints like real tubes",
  "applicationCategory": "GameApplication",
  "operatingSystem": "Any",
  "description": "A paint mixing simulator for CMYK paint mixing. Mix cyan, magenta, yellow, black and white like real paint, test ratios, save mixes and match target colors.",
  "keywords": [
    "paint mixing simulator",
    "cmyk paint mixing",
    "mix colors like real paint",
    "cyan magenta yellow black white paint"
  ],
  "isAccessibleForFree": true,

}
</script>
<style>
  :root {
    --bg: #D8D6D1; --card: #E6E4DF; --ink: #1f1d1b;
    --muted: #5a5751; --faint: #8a8781; --track: #cfccc6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
    font-family: 'Avenir Next', 'Segoe UI', system-ui, sans-serif;
    padding: 20px 16px 40px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-family: Georgia, 'Times New Roman', serif; font-size: 34px; margin: 0; letter-spacing: -0.5px; }
  .sub { margin: 4px 0 14px; color: var(--muted); font-size: 14px; }
  .mode-row { display: flex; gap: 8px; }
  .tab {
    flex: 1; padding: 10px 12px; border: 1.5px solid var(--ink); background: transparent;
    border-radius: 999px; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--ink);
  }
  .tab.active { background: var(--ink); color: var(--bg); }
  .swatch-row { display: flex; gap: 14px; margin-top: 20px; }
  .swatch-box { flex: 1; min-width: 0; }
  .blob {
    height: 120px; border-radius: 48% 52% 55% 45% / 50% 46% 54% 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 -6px 12px rgba(0,0,0,0.12);
    transition: background 300ms ease;
  }
  .blob.empty { border: 2px dashed #b9b6b0; box-shadow: none; }
  .blob-hint { color: var(--faint); font-size: 13px; text-align: center; padding: 0 12px; }
  .swatch-label { margin-top: 8px; font-size: 13px; font-weight: 600; }
  .mono { font-family: ui-monospace, Menlo, monospace; font-weight: 400; color: var(--muted); }
  .score-wrap { margin-top: 14px; }
  .score-bar-bg { height: 10px; background: #c2bfb9; border-radius: 999px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 999px; transition: width 300ms ease; background: var(--faint); }
  .score-bar.hit { background: #2e7d4f; }
  .score-text { margin-top: 6px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .ratio { margin-top: 12px; font-size: 13px; font-family: ui-monospace, Menlo, monospace; color: #3d3b37; min-height: 18px; }
  h2 { font-size: 15px; text-transform: uppercase; letter-spacing: 1px; margin: 18px 0 8px; }
  .tube-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    background: var(--card); border-radius: 12px; margin-bottom: 8px;
  }
  .cap-dot {
    width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid rgba(0,0,0,0.15); box-shadow: inset 0 -3px 5px rgba(0,0,0,0.15);
  }
  .tube-info { flex: 1; min-width: 0; }
  .tube-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .smear-bg { height: 8px; background: var(--track); border-radius: 999px; overflow: hidden; }
  .smear { height: 100%; border-radius: 999px; transition: width 300ms ease, background 300ms ease; width: 0; }
  .counter { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .round-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--ink);
    background: transparent; font-size: 18px; font-weight: 700; cursor: pointer; color: var(--ink); line-height: 1;
  }
  .round-btn:disabled { opacity: 0.35; cursor: default; }
  .parts { min-width: 22px; text-align: center; font-family: ui-monospace, Menlo, monospace; font-size: 16px; font-weight: 700; }
  .del-btn {
    width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid #a33;
    background: transparent; color: #a33; font-size: 15px; font-weight: 700;
    cursor: pointer; line-height: 1; margin-left: 4px; flex-shrink: 0;
  }
  .tube-hex { font-family: ui-monospace, Menlo, monospace; font-weight: 400; font-size: 12px; color: var(--muted); margin-left: 6px; }
  .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
  .btn {
    padding: 12px 16px; border-radius: 999px; border: 1.5px solid var(--ink);
    background: transparent; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--ink);
  }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn.primary { background: var(--ink); color: var(--bg); }
  .small-btn {
    padding: 6px 12px; border-radius: 999px; border: 1.5px solid #2e7d4f;
    background: #2e7d4f; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  footer { margin-top: 28px; font-size: 12px; color: var(--faint); line-height: 1.5; }
  footer a { color: var(--muted); }
  button:focus-visible { outline: 3px solid var(--ink); outline-offset: 2px; }
  .hidden { display: none; }
  @media (prefers-reduced-motion: reduce) { .blob, .smear, .score-bar { transition: none; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>CMYK+White – mix paints like real tubes</h1>
    <p class="sub">Mix paints like real tubes — test first, then paint.</p>
    <div class="mode-row">
      <button id="tab-frei" class="tab active">Free mixing</button>
      <button id="tab-ziel" class="tab">Match the target</button>
    </div>
  </header>

  <div class="swatch-row">
    <div class="swatch-box">
      <div id="mix-blob" class="blob empty"><span class="blob-hint">Add paint from the tubes</span></div>
      <div class="swatch-label">Your mix <span id="mix-hex" class="mono"></span></div>
    </div>
    <div id="target-box" class="swatch-box hidden">
      <div id="target-blob" class="blob"></div>
      <div class="swatch-label">Target color <span id="target-hex" class="mono"></span></div>
    </div>
  </div>

  <div id="score-wrap" class="score-wrap hidden">
    <div class="score-bar-bg"><div id="score-bar" class="score-bar"></div></div>
    <div class="score-text">
      <span id="score-text"></span>
      <button id="next-target" class="small-btn hidden">Next target</button>
    </div>
  </div>

  <div id="ratio" class="ratio"></div>

  <h2>Tubes</h2>
  <div id="tubes"></div>

  <div id="palette-section" class="hidden">
    <h2>Your palette</h2>
    <div id="palette"></div>
  </div>

  <div class="actions">
    <button id="reset" class="btn">Clear palette</button>
    <button id="save" class="btn primary">Save mix</button>
    <button id="new-target" class="btn hidden">New target color</button>
  </div>

  <footer id="footer">
    Color mixing powered by <a href="https://scrtwpns.com/mixbox/" target="_blank" rel="noopener">Mixbox</a>
    by Secret Weapons (CC BY-NC 4.0) — based on real measured pigments.
    Non-commercial open-source project.
  </footer>
</div>

<script src="https://scrtwpns.com/mixbox.js"></script>
<script>
"use strict";

// ---------- Base pigments: CMY + Black + White ----------
const BASES = [
  { id: "c", name: "Cyan",    rgb: [0, 158, 224] },
  { id: "m", name: "Magenta", rgb: [227, 0, 123] },
  { id: "y", name: "Yellow",    rgb: [255, 220, 0] },
  { id: "k", name: "Black", rgb: [22, 20, 18] },
  { id: "w", name: "White",    rgb: [253, 253, 251] },
];

const hasMixbox = typeof mixbox !== "undefined" && mixbox.rgbToLatent;

// ---------- Mixing engine 1: Mixbox (real measured pigments) ----------
let baseLatents = null;
if (hasMixbox) {
  baseLatents = BASES.map((b) => mixbox.rgbToLatent(b.rgb[0], b.rgb[1], b.rgb[2]));
}
function mixWithMixbox(weights, extra) {
  // extra: [{latent, w}] for saved mixes
  let total = weights.reduce((a, b) => a + b, 0) + extra.reduce((a, x) => a + x.w, 0);
  if (total <= 0) return null;
  const z = new Array(mixbox.LATENT_SIZE).fill(0);
  weights.forEach((w, i) => {
    if (w > 0) for (let j = 0; j < z.length; j++) z[j] += (w / total) * baseLatents[i][j];
  });
  extra.forEach((x) => {
    if (x.w > 0) for (let j = 0; j < z.length; j++) z[j] += (x.w / total) * x.latent[j];
  });
  return mixbox.latentToRgb(z);
}

// ---------- Mixing engine 2: Kubelka-Munk fallback (if Mixbox is offline) ----------
const STRENGTH = { c: 1.0, m: 0.9, y: 0.45, k: 1.6, w: 0.35 };
const clamp = (x, lo, hi) => Math.min(hi, Math.max(lo, x));
const srgbToLin = (v) => { const s = v / 255; return s <= 0.04045 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4); };
const linToSrgb = (l) => { const s = l <= 0.0031308 ? l * 12.92 : 1.055 * Math.pow(l, 1 / 2.4) - 0.055; return Math.round(clamp(s, 0, 1) * 255); };
const toKS = (r) => { const R = clamp(r, 0.02, 0.985); return ((1 - R) * (1 - R)) / (2 * R); };
const fromKS = (ks) => 1 + ks - Math.sqrt(ks * ks + 2 * ks);
function mixWithKM(weights, extra) {
  const eff = weights.map((w, i) => w * STRENGTH[BASES[i].id]);
  const extraEff = extra.map((x) => x.w);
  const total = eff.reduce((a, b) => a + b, 0) + extraEff.reduce((a, b) => a + b, 0);
  if (total <= 0) return null;
  return [0, 1, 2].map((ch) => {
    let ks = 0;
    eff.forEach((w, i) => { if (w > 0) ks += (w / total) * toKS(srgbToLin(BASES[i].rgb[ch])); });
    extra.forEach((x, i) => { if (extraEff[i] > 0) ks += (extraEff[i] / total) * toKS(srgbToLin(x.rgb[ch])); });
    return linToSrgb(fromKS(ks));
  });
}

function mixColor(weights, extra) {
  return hasMixbox ? mixWithMixbox(weights, extra) : mixWithKM(weights, extra);
}

// ---------- Helper functions ----------
const rgbToHex = (rgb) => "#" + rgb.map((v) => v.toString(16).padStart(2, "0")).join("").toUpperCase();
const gcd = (a, b) => (b === 0 ? a : gcd(b, a % b));

function rgbToLab(rgb) {
  const [lr, lg, lb] = rgb.map(srgbToLin);
  const x = (lr * 0.4124 + lg * 0.3576 + lb * 0.1805) / 0.95047;
  const y = lr * 0.2126 + lg * 0.7152 + lb * 0.0722;
  const z = (lr * 0.0193 + lg * 0.1192 + lb * 0.9505) / 1.08883;
  const f = (t) => (t > 0.008856 ? Math.cbrt(t) : 7.787 * t + 16 / 116);
  const [fx, fy, fz] = [f(x), f(y), f(z)];
  return [116 * fy - 16, 500 * (fx - fy), 200 * (fy - fz)];
}
function deltaE(a, b) {
  const [l1, a1, b1] = rgbToLab(a), [l2, a2, b2] = rgbToLab(b);
  return Math.sqrt((l1 - l2) ** 2 + (a1 - a2) ** 2 + (b1 - b2) ** 2);
}
function randomTarget() {
  let w;
  do {
    w = BASES.map(() => (Math.random() < 0.55 ? Math.floor(Math.random() * 6) : 0));
  } while (w.reduce((a, b) => a + b, 0) < 2);
  return { rgb: mixColor(w, []) };
}

// ---------- State ----------
const state = {
  mode: "free",
  baseParts: [0, 0, 0, 0, 0],
  saved: [],       // { name, rgb, latent? }
  savedParts: [],
  target: null,
};

// ---------- DOM ----------
const $ = (id) => document.getElementById(id);
const tubesEl = $("tubes"), paletteEl = $("palette");

function makeRow(name, colorHex, getParts, onChange, opts) {
  opts = opts || {};
  const row = document.createElement("div");
  row.className = "tube-row";
  row.innerHTML = `
    <div class="cap-dot" style="background:${colorHex}"></div>
    <div class="tube-info">
      <div class="tube-name"></div>
      <div class="smear-bg"><div class="smear" style="background:${colorHex}"></div></div>
    </div>
    <div class="counter">
      <button class="round-btn minus" aria-label="Remove one part of ${name}">−</button>
      <span class="parts">0</span>
      <button class="round-btn plus" aria-label="Add one part of ${name}">+</button>
    </div>`;
  row.querySelector(".tube-name").textContent = name;
  if (opts.hex) {
    const hexEl = document.createElement("span");
    hexEl.className = "tube-hex";
    hexEl.textContent = opts.hex;
    row.querySelector(".tube-name").appendChild(hexEl);
  }
  if (opts.onDelete) {
    const del = document.createElement("button");
    del.className = "del-btn";
    del.textContent = "×";
    del.setAttribute("aria-label", "Delete " + name + " from the palette");
    del.addEventListener("click", opts.onDelete);
    row.querySelector(".counter").appendChild(del);
  }
  row.querySelector(".minus").addEventListener("click", () => onChange(-1));
  row.querySelector(".plus").addEventListener("click", () => onChange(1));
  row.update = (totalParts) => {
    const p = getParts();
    row.querySelector(".parts").textContent = p;
    row.querySelector(".minus").disabled = p === 0;
    row.querySelector(".smear").style.width = totalParts > 0 ? (p / totalParts) * 100 + "%" : "0";
  };
  return row;
}

const baseRows = BASES.map((b, i) =>
  makeRow(b.name, rgbToHex(b.rgb), () => state.baseParts[i], (d) => {
    state.baseParts[i] = Math.max(0, state.baseParts[i] + d);
    render();
  })
);
baseRows.forEach((r) => tubesEl.appendChild(r));

let paletteRows = [];
function rebuildPalette() {
  paletteEl.innerHTML = "";
  paletteRows = state.saved.map((entry, idx) => {
    const row = makeRow(
      entry.name,
      rgbToHex(entry.rgb),
      () => state.savedParts[idx],
      (d) => {
        state.savedParts[idx] = Math.max(0, state.savedParts[idx] + d);
        render();
      },
      {
        hex: rgbToHex(entry.rgb),
        onDelete: () => {
          state.saved.splice(idx, 1);
          state.savedParts.splice(idx, 1);
          rebuildPalette();
          render();
        },
      }
    );
    paletteEl.appendChild(row);
    return row;
  });
  $("palette-section").classList.toggle("hidden", state.saved.length === 0);
}

// ---------- Rendering ----------
function currentMix() {
  const extra = state.saved.map((s, i) => ({
    w: state.savedParts[i] || 0, latent: s.latent, rgb: s.rgb,
  }));
  return mixColor(state.baseParts, extra);
}

function render() {
  const totalParts =
    state.baseParts.reduce((a, b) => a + b, 0) +
    state.savedParts.reduce((a, b) => a + b, 0);
  const rgb = currentMix();

  const blob = $("mix-blob");
  if (rgb) {
    blob.classList.remove("empty");
    blob.innerHTML = "";
    blob.style.background = rgbToHex(rgb);
    $("mix-hex").textContent = rgbToHex(rgb);
  } else {
    blob.classList.add("empty");
    blob.style.background = "transparent";
    blob.innerHTML = '<span class="blob-hint">Add paint from the tubes</span>';
    $("mix-hex").textContent = "";
  }

  // Ratio (reduced, base colors only)
  const used = BASES.map((b, i) => ({ n: b.name, p: state.baseParts[i] })).filter((x) => x.p > 0);
  if (used.length > 0) {
    const g = used.reduce((acc, x) => gcd(acc, x.p), used[0].p);
    $("ratio").textContent = "Ratio: " + used.map((x) => `${x.p / g} ${x.n}`).join(" : ");
  } else {
    $("ratio").textContent = "";
  }

  baseRows.forEach((r) => r.update(totalParts));
  paletteRows.forEach((r) => r.update(totalParts));
  $("reset").disabled = totalParts === 0;
  $("save").disabled = !rgb;

  // Target challenge
  if (state.mode === "target" && state.target && rgb) {
    const de = deltaE(rgb, state.target.rgb);
    const score = Math.max(0, Math.round(100 - de * 2.2));
    const hit = de < 5;
    $("score-wrap").classList.remove("hidden");
    $("score-bar").style.width = score + "%";
    $("score-bar").classList.toggle("hit", hit);
    $("score-text").textContent = hit ? "Matched! 🎉" : `Match: ${score} %`;
    $("next-target").classList.toggle("hidden", !hit);
  } else if (state.mode === "target") {
    $("score-wrap").classList.remove("hidden");
    $("score-bar").style.width = "0";
    $("score-text").textContent = "Start mixing!";
    $("next-target").classList.add("hidden");
  } else {
    $("score-wrap").classList.add("hidden");
  }
}

// ---------- Actions ----------
function reset() {
  state.baseParts = [0, 0, 0, 0, 0];
  state.savedParts = state.saved.map(() => 0);
  render();
}
function newTarget() {
  state.target = randomTarget();
  $("target-blob").style.background = rgbToHex(state.target.rgb);
  $("target-hex").textContent = rgbToHex(state.target.rgb);
  reset();
}

$("reset").addEventListener("click", reset);
$("save").addEventListener("click", () => {
  const rgb = currentMix();
  if (!rgb) return;
  const entry = { name: "Mix " + (state.saved.length + 1), rgb };
  if (hasMixbox) entry.latent = mixbox.rgbToLatent(rgb[0], rgb[1], rgb[2]);
  state.saved.push(entry);
  state.savedParts.push(0);
  rebuildPalette();
  render();
});
$("new-target").addEventListener("click", newTarget);
$("next-target").addEventListener("click", newTarget);
$("tab-frei").addEventListener("click", () => {
  state.mode = "free";
  $("tab-frei").classList.add("active");
  $("tab-ziel").classList.remove("active");
  $("target-box").classList.add("hidden");
  $("new-target").classList.add("hidden");
  render();
});
$("tab-ziel").addEventListener("click", () => {
  state.mode = "target";
  $("tab-ziel").classList.add("active");
  $("tab-frei").classList.remove("active");
  $("target-box").classList.remove("hidden");
  $("new-target").classList.remove("hidden");
  newTarget();
});

if (!hasMixbox) {
  $("footer").innerHTML =
    "Mixbox could not be loaded — the built-in Kubelka-Munk simulation is running. " +
    "When online, the page automatically loads the real measured pigment data.";
}

render();
</script>
</body>
</html>
